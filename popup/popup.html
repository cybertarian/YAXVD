<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>X Video Downloader Settings</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <h1>X Video Downloader</h1>

  <fieldset>
    <legend>Mode</legend>

    <label class="mode-option">
      <input type="radio" name="mode" value="hybrid" />
      <span class="mode-text">
        <span class="mode-title">Hybrid (recommended)</span>
        <span class="mode-desc">Reads video URLs from the page's own traffic; falls back to a public API if needed.</span>
      </span>
    </label>

    <label class="mode-option">
      <input type="radio" name="mode" value="intercept-only" />
      <span class="mode-text">
        <span class="mode-title">Intercept only</span>
        <span class="mode-desc">Same page-traffic reading, but never calls the public API. Fails if the data wasn't captured yet.</span>
      </span>
    </label>

    <label class="mode-option">
      <input type="radio" name="mode" value="syndication-only" />
      <span class="mode-text">
        <span class="mode-title">Public API only</span>
        <span class="mode-desc">Never patches the page's network functions — lowest footprint. Public tweets only.</span>
      </span>
    </label>
  </fieldset>

  <label for="subfolder">Download subfolder (inside your Downloads folder)</label>
  <input id="subfolder" type="text" placeholder="XVideos" />

  <button id="saveBtn">Save</button>
  <div id="status"></div>
</body>
<script src="popup.js"></script>
</html>
